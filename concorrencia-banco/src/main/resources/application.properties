spring.application.name=concorrencia-banco

# Console web do H2: http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Banco em memória
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Garante que o schema seja criado e que o import.sql seja executado
spring.jpa.hibernate.ddl-auto=create-drop

# Mostra as queries SQL no console (ajuda a observar o UPDATE com WHERE version = ?)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
